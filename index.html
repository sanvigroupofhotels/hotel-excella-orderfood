<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1"/>
      <title>Hotel Excella - Food Ordering</title>
      <style>
         :root {
         --primary: #2e7d32;
         --accent: #f9a825; 
         --light: #ffffff;
         --dark: #333333;
         --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         }
         body { margin: 0; font-family: var(--font-family); background: #fafafa; color: var(--dark); }
         header { text-align: center; padding: 1rem 0; background: var(--primary); color: var(--light); }
         header img { width: 100px; height: auto; margin-bottom: 0.5rem; }
         header h1 { margin: 0; font-size: 2rem; font-weight: 700; color: var(--accent); }
         header p { margin: 0; font-size: 1rem; font-weight: 500; color: var(--light); }
         .topbar { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--light); border-bottom: 1px solid #ddd; }
         select, button { padding: 6px 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.9rem; cursor: pointer; }
         main { max-width: 900px; margin: auto; padding: 1rem; }
		section.card h2, section.card h3 {
		  margin-top: 0;
		  color: var(--primary);
		  border-bottom: 3px solid var(--accent);
		  padding-bottom: 6px;
		  margin-bottom: 1rem;
		}
		#guestInfo label {
		  display: block;
		  font-weight: 600;
		  margin-bottom: 4px;
		  color: var(--primary);
		}
		#guestInfo input {
		  width: 100%;
		  padding: 10px;
		  border: 2px solid var(--primary);
		  border-radius: 6px;
		  margin-bottom: 15px;
		  font-size: 1rem;
		}
         #menuTabs { display: flex; margin-bottom: 0.5rem; border-radius: 8px; overflow: hidden; flex-wrap: wrap; }
         .tab-btn { flex: 1; min-width: 100px; padding: 0.6rem 0; font-weight: 600; text-align: center; cursor: pointer; background: #eee; border: none; }
         .tab-btn.active { background: var(--accent); color: var(--light); }
         .category-tabs { display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; padding: 8px 0; margin-bottom: 0.5rem; }
         .category-tabs button { flex: 0 0 auto; border: 1px solid #aaa; background: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
		 
.category-tabs button.active {
  border-color: green;
  background: green;
  color: #fff;
}

		 .menu-item {
		  display: grid;
		  grid-template-columns: 1fr auto auto; /* name/desc | price | qty */
		  align-items: center;
		  gap: 10px;
		  padding: 12px;
		  border-radius: 10px;
		  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
		  margin-bottom: 12px;
		}

		.item-info {
		  min-width: 200px;
		}

		.item-name {
		  font-weight: 600;
		  color: var(--primary);
		  margin-bottom: 4px;
		}

		.item-price {
		  font-weight: 600;
		  color: var(--accent);
		  white-space: nowrap;
		}

		.quantity-selector {
		  display: flex;
		  align-items: center;
		  gap: 6px;
		}

		.quantity-selector button {
		  padding: 4px 8px;
		  background: var(--primary);
		  color: #fff;
		  border: none;
		  border-radius: 6px;
		  cursor: pointer;
		  font-size: 0.85rem;
		  font-weight: 600;
		}

		.quantity-selector .qty-val {
		  min-width: 20px;
		  text-align: center;
		  font-weight: 600;
		}



#orderBox {
  background: var(--primary);
  color: #fff;
  border-radius: 8px;
  padding: 1rem;
}

#orderList {
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 1rem;
}

#totalBox {
  font-size: 1.2rem;
  font-weight: 700;
  border-top: 2px solid var(--accent);
  padding-top: 0.5rem;
  margin-bottom: 1rem;
}

#confirmOrder {
  width: 100%;
  padding: 0.8rem;
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.3s ease;
}

#confirmOrder:disabled {
  background: #bbb;
  cursor: not-allowed;
}



         #faqModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
         #faqContent { background: #fff; padding: 1.5rem; border-radius: 10px; max-width: 600px; max-height: 80%; overflow-y: auto; }
         #faqContent h2 { margin-top: 0; color: var(--primary); }
         #closeFaq { margin-top: 1rem; background: var(--primary); color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
		@media (max-width: 600px) {
		  .menu-item {
			grid-template-columns: 1fr auto;
			grid-template-rows: auto auto;
		  }
		  .item-price {
			grid-column: 2;
			grid-row: 1;
		  }
		  .quantity-selector {
			grid-column: 2;
			grid-row: 2;
		  }
		}
         .quantity-selector {
         display: flex;
         align-items: center;
         gap: 6px;
         }
         .quantity-selector button {
         padding: 4px 8px;
         border: none;
         border-radius: 6px;
         background: var(--primary);
         color: #fff;
         cursor: pointer;
         font-size: 0.9rem;
         }
         .quantity-selector button:hover {
         background: var(--accent);
         }
         .quantity-selector .qty-val {
         min-width: 20px;
         text-align: center;
         font-weight: 600;
         }
      </style>

/* ---------- Mobile Responsive ---------- */
<style id="mobile-responsive-overrides">
@media (max-width: 768px) {
  main {
    padding: 0.5rem;
  }

  .menu-item {
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    padding: 10px;
  }

  .item-price {
    grid-column: 2;
    grid-row: 1;
    font-size: 1rem;
  }

  .quantity-selector {
    grid-column: 2;
    grid-row: 2;
    margin-top: 6px;
  }

  .item-info {
    grid-column: 1 / span 2;
    grid-row: 1;
  }

  #orderBox {
    padding: 0.8rem;
  }

  #confirmOrder {
    font-size: 1rem;
    padding: 0.7rem;
  }

  #helpBtn {
    font-size: 1rem;
    padding: 0.5rem 0.8rem;
  }
}

@media (max-width: 480px) {
  .item-name {
    font-size: 1rem;
  }

  .item-desc {
    font-size: 0.8rem;
  }

  .item-price {
    font-size: 0.95rem;
  }

  .quantity-selector button {
    font-size: 0.75rem;
    padding: 3px 6px;
  }

  .quantity-selector .qty-val {
    font-size: 0.85rem;
  }
}
    </style>

/* ---------- Mobile Responsive ---------- */

   </head>
   <body>
      <header>
<div style="display: flex; align-items: center; justify-content: space-between;">
<div style="flex: 1; text-align: centre;">
<img alt="Hotel Logo" src="images/hotelexcellalogo.png" style="width: 125px; height: auto;"/>
<h1 style="margin: 0;">HOTEL EXCELLA</h1>
         <p style="margin: 0; color: black; font-weight: 900;">IN-HOUSE ROOM SERVICE MENU</p>
      </header>
      <div class="topbar">
         <select id="langSelect">
            <option value="en">English</option>
            <option value="hi">हिन्दी</option>
            <option value="te">తెలుగు</option>
            <option value="ta">தமிழ்</option>
         </select>
         <button id="faqBtn" data-translate="faq">FAQ</button>
      </div>
      <main>
		<section id="guestInfo" class="card">
		  <h2>Guest Information</h2>
		  
		  <label for="guestName">Guest Name: *</label>
		  <input type="text" id="guestName" placeholder="Enter your name" required>
		  
		  <label for="roomNo">Room Number: *</label>
		  <input type="text" id="roomNo" placeholder="Enter your room number" required>
		  
		  <label for="Whatsappnum">WhatsApp Number: *</label>
		  <input type="tel" id="Whatsappnum" placeholder="+1234567890" required>
		</section>

         <section id="menuSection" class="card">
            <h2 data-translate="menu">Menu</h2>
            <nav id="menuTabs">
               <button id="tabVeg" class="tab-btn active" data-translate="veg">Veg</button>
               <button id="tabNonVeg" class="tab-btn" data-translate="nonveg">Non Veg</button>
               <button id="tabGeneral" class="tab-btn" data-translate="general">General</button>
            </nav>
            <div id="menuContainer">Loading menu…</div>


<!-- Order Summary Section -->
<section id="orderSummarySection">
  <h2 style="color: var(--primary);">Order Summary</h2>

  <div id="orderBox" style="background: var(--primary); color: #fff; border-radius: 8px; padding: 1rem;">
    <h3 style="color: var(--accent); margin: 0; border-bottom: none;">Selected Items</h3>

    <ul id="orderList" style="margin: 0.5rem 0; padding-left: 1rem; list-style-type: disc; max-height: 200px; overflow-y: auto;">
      <li>No items selected</li>
    </ul>

<div id="totalBox" 
     style="font-weight: 700; font-size: 1.2rem; margin: 0.5rem 0; border-top: 2px solid var(--accent); padding-top: 0.5rem; text-align: right;">
  Total: ₹<span id="orderTotal">0.00</span>
</div>

    <div style="text-align: right;">
      <button id="confirmOrder" disabled 
        style="width: 40%; padding: 0.8rem; background: var(--accent); color: #fff; font-weight: 700; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer;">
        Confirm Order
      </button>
    </div>
  </div>
</section>
<!-- End Order Summary Section -->






      </main>
      <div id="faqModal">
         <div id="faqContent">
            <h2 data-translate="faqTitle">Frequently Asked Questions</h2>
            <div id="faqText"></div>
            <button id="closeFaq" data-translate="close">Close</button>
         </div>
      </div>
      <script>
         (() => {
           const translations = {
             en: { guestInfo:"Guest Information", name:"Name:", room:"Room Number:", whatsapp:"Whatsapp Number:", menu:"Menu", veg:"Veg", nonveg:"Non Veg", general:"General", orderSummary:"Order Summary", total:"Total:", confirm:"Confirm Order", faq:"FAQ", faqTitle:"Frequently Asked Questions", close:"Close", faqs:`<p><strong>How to order?</strong> Fill your guest details and select quantities...</p>` }
           };
           const langSelect = document.getElementById('langSelect');
           const faqText = document.getElementById('faqText');
			function applyTranslations(lang) {
			  document.querySelectorAll('[data-translate]').forEach(el => {
				const key = el.getAttribute('data-translate');
				if (translations[lang] && translations[lang][key]) {
				  if (el.tagName === "INPUT" || el.tagName === "TEXTAREA") {
					// update placeholder
					el.setAttribute("placeholder", translations[lang][key]);
				  } else if (el.tagName === "BUTTON") {
					// update button text
					el.textContent = translations[lang][key];
				  } else {
					// update normal text content
					el.textContent = translations[lang][key];
				  }
				}
			  });

			  // FAQ translations
			  faqText.innerHTML = translations[lang].faqs;
			}         
           const menuContainer = document.getElementById('menuContainer');
           const tabVegBtn = document.getElementById('tabVeg');
           const tabNonVegBtn = document.getElementById('tabNonVeg');
           const tabGeneralBtn = document.getElementById('tabGeneral');
           const orderList = document.getElementById('orderList');
           const orderTotalEl = document.getElementById('orderTotal');
           const confirmOrderBtn = document.getElementById('confirmOrder');
           const guestNameEl = document.getElementById('guestName');
           const roomNoEl = document.getElementById('roomNo');
           const whatsappEl = document.getElementById('Whatsappnum');
         
           let menuData = { veg:{}, nonveg:{}, general:{} };
           let currentTab = 'veg';
           let currentOrder = {};
         
		function parseCSV(text) {
		  const lines = text.trim().split('\n');
		  const headers = lines[0].split(',').map(h => h.trim());

		  return lines.slice(1).map(line => {
			const values = [];
			let match;
			const regex = /("([^"]*)"|[^,]+)/g; // match quoted "..." or unquoted text

			while ((match = regex.exec(line)) !== null) {
			  if (match[2] !== undefined) {
				values.push(match[2]); // inside quotes
			  } else {
				values.push(match[1]);
			  }
			}

			const obj = {};
			headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : "");
			return obj;
		  });
		}

         
           function renderMenu() {
             const data = menuData[currentTab];
             if (!data || Object.keys(data).length === 0) { menuContainer.innerHTML = '<p>No items</p>'; return; }
             let tabsHtml = '<div class="category-tabs">';
             for (const category of Object.keys(data)) {
               tabsHtml += `<button data-category="${category}" onclick="showCategory('${category}')">${category}</button>`;
             }
             tabsHtml += '</div><div id="categoryContent"></div>';
             menuContainer.innerHTML = tabsHtml;
             const firstCategory = Object.keys(data)[0];
             if (firstCategory) showCategory(firstCategory);
           }
         
           window.showCategory = function(category) {
             const items = menuData[currentTab][category] || [];
             const container = document.getElementById('categoryContent');
             container.innerHTML = '';
             items.forEach(item => {
               const qty = currentOrder[item.Name]?.qty || 0;
               container.innerHTML += `
                 <div class="menu-item">
                   <div class="item-info"><div class="item-name">${item.Name}</div><div>${item.Description}</div></div>
                   <div class="item-price">₹${item.Price}</div>
                   <div class="quantity-selector" id="qty-${item.Name.replace(/\s+/g,'_')}">
         			  ${qty > 0 
         				? `<button class="dec-btn" data-name="${item.Name}" data-price="${item.Price}">-</button>
         				   <span class="qty-val">${qty}</span>
         				   <button class="inc-btn" data-name="${item.Name}" data-price="${item.Price}">+</button>`
         				: `<button class="add-btn" data-name="${item.Name}" data-price="${item.Price}">Add</button>`}
         			</div>
                 </div>`;
			// Highlight active sub tab
				document.querySelectorAll('.category-tabs button').forEach(btn => {
				  if (btn.getAttribute('data-category') === category) {
					btn.classList.add('active');
				  } else {
					btn.classList.remove('active');
				  }
				});
         	// Add button → starts qty = 1
         		container.querySelectorAll('.add-btn').forEach(btn => {
         		  btn.addEventListener('click', () => {
         			const name = btn.dataset.name;
         			const price = parseFloat(btn.dataset.price);
         			currentOrder[name] = { qty: 1, price };
         			updateOrderSummary();
         			showCategory(category); // re-render controls
         		  });
         		});
         
         	// Increment button
         		container.querySelectorAll('.inc-btn').forEach(btn => {
         		  btn.addEventListener('click', () => {
         			const name = btn.dataset.name;
         			currentOrder[name].qty++;
         			updateOrderSummary();
         			showCategory(category);
         		  });
         		});
         
         	// Decrement button
         		container.querySelectorAll('.dec-btn').forEach(btn => {
         		  btn.addEventListener('click', () => {
         			const name = btn.dataset.name;
         			currentOrder[name].qty--;
         			if (currentOrder[name].qty <= 0) delete currentOrder[name];
         			updateOrderSummary();
         			showCategory(category);
         		  });
         		});
             });
             container.querySelectorAll('input[type="number"]').forEach(input => input.addEventListener('input', onQtyChange));
           };
         
           function onQtyChange(e) {
             const input = e.target;
             const name = input.dataset.name;
             const price = parseFloat(input.dataset.price);
             const qty = parseInt(input.value) || 0;
             if (qty > 0) currentOrder[name] = { qty, price };
             else delete currentOrder[name];
             updateOrderSummary();
           }
         
           function updateOrderSummary() {
             orderList.innerHTML = '';
             let total = 0;
             for (const [name, item] of Object.entries(currentOrder)) {
               const lineTotal = item.qty * item.price;
               total += lineTotal;
               orderList.innerHTML += `<li>${name} x ${item.qty} = ₹${lineTotal}</li>`;
             }
             orderTotalEl.textContent = total.toFixed(2);
           }
         
           // Tab switching
           function switchActive(activeBtn) {
             [tabVegBtn, tabNonVegBtn, tabGeneralBtn].forEach(btn => btn.classList.remove('active'));
             activeBtn.classList.add('active');
           }
           tabVegBtn.addEventListener('click', () => { currentTab = 'veg'; switchActive(tabVegBtn); renderMenu(); });
           tabNonVegBtn.addEventListener('click', () => { currentTab = 'nonveg'; switchActive(tabNonVegBtn); renderMenu(); });
           tabGeneralBtn.addEventListener('click', () => { currentTab = 'general'; switchActive(tabGeneralBtn); renderMenu(); });
         
           // Load menu.csv
           fetch('menu.csv')
             .then(r => r.text())
             .then(text => {
               const rows = parseCSV(text);
               rows.forEach(row => {
                 const type = row.Type.toLowerCase();
                 const category = row.Category || "Misc";
                 if (!menuData[type][category]) menuData[type][category] = [];
                 menuData[type][category].push(row);
               });
               renderMenu();
             });
         
           confirmOrderBtn.addEventListener('click', () => {
             let orderDetails = Object.entries(currentOrder).map(([name, item]) => `${name} x ${item.qty}`).join(', ');
             let total = orderTotalEl.textContent;
             let msg = `Guest: ${guestNameEl.value}, Room: ${roomNoEl.value}, WhatsApp: ${whatsappEl.value}. Order: ${orderDetails}. Total: ₹${total}`;
             window.open(`https://wa.me/919985908131?text=${encodeURIComponent(msg)}`);
           });
         
           document.getElementById('faqBtn').onclick = () => { document.getElementById('faqModal').style.display = 'flex'; };
           document.getElementById('closeFaq').onclick = () => { document.getElementById('faqModal').style.display = 'none'; };
         })();
      </script>
   </body>
</html>
