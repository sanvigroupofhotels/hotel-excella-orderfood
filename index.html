<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Hotel Excella - Food Ordering</title>
<style>
         :root {
	 --primary: #2e7d32; /* or your theme color */
  	 --accent: #f9a825;
         --orange: #f9a825;
         --dark-green: #2e7d32;
         --yellow: #fff176;
         --bg-black: #000000;
         --white: #ffffff;
         --light-gray: #f5f5f5;
         --dark-gray: #333333;
         --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         --font-main-size: 1rem;
         }
         body {
         margin: 0;
         font-family: var(--font-family);
         background-color: var(--bg-black);
         color: var(--white);
         line-height: 1.6;
         font-size: var(--font-main-size);
         }
         header {
         text-align: center;
         padding: 1rem 0;
         background: var(--dark-green);
         }
         header img {
         width: 80px;
         height: auto;
         margin-bottom: 0.5rem;
         }
         header h1 {
         margin: 0;
         font-size: 2rem;
         font-weight: 700;
         color: var(--orange);
         text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
         }
         header p {
         margin: 0;
         font-size: 1.1rem;
         font-weight: 600;
         color: var(--yellow);
         }
         
         main {
         max-width: 900px;
         margin: 1rem auto 4rem auto;
         background: var(--light-gray);
         border-radius: 12px;
         padding: 1rem 1.5rem;
         color: var(--dark-gray);
         position: relative;
         }
         section {
         margin-bottom: 2rem;
         }
         h2 {
         border-bottom: 0px solid var(--orange);
         padding-bottom: 0 rem;
         color: var(--dark-green);
         }
         form#guestInfo {
         display: flex;
         flex-wrap: wrap;
         gap: 1rem;
         }
         form#guestInfo label {
         flex: 1 1 100%;
         font-weight: 750;
         }
         form#guestInfo input {
         padding: 0.5rem;
         border: 2px solid var(--dark-green);
         border-radius: 6px;
         font-size: 1.1rem;
         width: 100%;
         box-sizing: border-box;
         }
         #menuTabs {
         display: flex;
         border-bottom: 3px solid var(--orange);
         margin: 0 0 1rem 0;
         }
         #menuSubTabs {
         display: flex;
         border-bottom: 3px solid var(--orange);
         margin: 0 0 1rem 0;
         }
         .tab-btn {
         flex: 1;
         padding: 0.6rem 0;
         font-weight: 700;
         font-size: 1.1rem;
         text-align: center;
         cursor: pointer;
         background: var(--light-gray);
         border: none;
         border-bottom: 3px solid transparent;
         color: var(--dark-green);
         transition: all 0.3s ease;
         user-select: none;
         }
         .tab-btn.active {
         background: var(--white);
         border-bottom: 3px solid var(--orange);
         color: var(--orange);
         }
         .tab-btn:focus-visible {
         outline: 3px solid var(--orange);
         }
         .category {
         margin-bottom: 1.5rem;
         }
         .category h3 {
         margin-top: 0;
         margin-bottom: 0.5rem;
         color: var(--orange);
         border-bottom: 2px solid var(--dark-green);
         padding-bottom: 0.2rem;
         }
         .menu-item {
         display: flex;
         justify-content: space-between;
         align-items: center;
         padding: 0.5rem 0;
         border-bottom: 1px dotted var(--dark-green);
         }
         .menu-item:last-child {
         border-bottom: none;
         }
         .menu-item-details {
         flex-grow: 1; /* Allow the item name and description to take up available space */
         margin-right: 10px;
         }
         .menu-item-controls {
         display: flex;
         align-items: center;
         justify-content: space-between;
         }
         .item-name {
         font-weight: 700;
         font-size: 1.15rem;
         color: var(--dark-green);
         }
         .item-desc {
         font-style: italic;
         font-size: 0.9rem;
         color: #555;
         margin-top: 0.2rem;
         }
         .item-price {
         font-weight: 700;
         font-size: 1.1rem;
         margin-right: 1rem;
         color: var(--orange);
         min-width: 75px;
         text-align: right;
         }
         .quantity-selector {
         display: inline-flex;
         align-items: center;
         gap: 0.3rem;
         }
         .quantity-selector button {
         padding: 4px 8px;
         border: none;
         border-radius: 6px;
         background: #28a745; /* Green color */
         color: #fff;
         cursor: pointer;
         font-size: 0.9rem;
         }
         .quantity-selector button:hover {
         background: #218838; /* Darker green on hover */
         }
         .quantity-selector .qty-val {
         min-width: 20px;
         text-align: center;
         font-weight: 600;
         }
	 
#orderBox {
  background: var(--dark-green);
  color: #fff;

}
#orderBox h3 {

}
#orderList {

  width: 40%;

         .sr-only {
         position: absolute !important;
         width: 1px !important;
         height: 1px !important;
         padding: 0 !important;
         margin: -1px !important;
         overflow: hidden !important;
         clip: rect(0,0,0,0) !important;
         border: 0 !important;

         .item-info {
         flex-direction: column;
         gap: 0.35rem;
         }
         .item-name {
         font-size: 1rem;
         }
         .menu-item {
         padding: 0.3rem 0;
         }
         #orderSummary {
         padding: 0.75rem;
         }
         }         
      
.category-tabs {
    display: flex;
    gap: 8px;

}
.category-tabs button.active {
    border-color: green;

}
.menu-card {

}

}

}
.order-summary {
    position: fixed;
    bottom: 0;

}
    </style>

<body>
<header>
<div style="display: flex; align-items: center; justify-content: space-between;">
<div style="flex: 1; text-align: centre;">
<img alt="Hotel Logo" src="images/hotelexcellalogo.png" style="width: 125px; height: auto;"/>
<h1 style="margin: 0;">HOTEL EXCELLA</h1>
<p style="margin: 0; color: black; font-weight: 900;">IN-HOUSE ROOM SERVICE MENU</p>
</div></div></header>

<!-- Language Selector Section -->
<div aria-label="Select language" id="langSelector">
<label class="sr-only" for="languageSelect">Language</label>
<select aria-label="Language selection" aria-live="polite" id="languageSelect">
<option selected="" value="en">English</option>
<option value="hi">हिन्दी</option>
<option value="te">తెలుగు</option>
<option value="ta">தமிழ்</option>
</select>
</div>
<!-- Language Selector Section -->
<button aria-controls="faqModal" aria-expanded="false" aria-haspopup="dialog" id="helpBtn" style="position: fixed; bottom: 1rem; right: 1rem; z-index: 600; background: var(--orange); border: none; color: var(--bg-black); font-weight: 700; font-size: 1.2rem; padding: 0.6rem 1rem; border-radius: 8px; cursor: pointer; box-shadow: 0 0 10px var(--orange);">Help / FAQ</button>
<main>
<!-- Menu Section -->
<section aria-label="Menu Section" id="menuSection">
<h2 id="menuTitle">Menu</h2>
<nav aria-label="Food category tabs" id="menuTabs" role="tablist" tabindex="0">
<button aria-controls="panelVeg" aria-selected="true" class="tab-btn active" id="tabVeg" role="tab" tabindex="0">Veg</button>
<button aria-controls="panelNonVeg" aria-selected="false" class="tab-btn" id="tabNonVeg" role="tab" tabindex="-1">Non Veg</button>
<button aria-controls="panelGeneral" aria-selected="true" class="tab-btn" id="tabGeneral" role="tab" tabindex="2">General</button>
</nav>
<div aria-atomic="true" aria-live="polite" id="menuContainer" tabindex="0">
<p style="font-style: italic; color: #777;">Loading menu…</p>
</div>
</section>
<!-- Menu Section -->
<!-- Order Summary Section -->
<section id="orderSummarySection">
<div class="order-summary">
<h4>Order Summary</h4>
<div class="selected-items">
<strong>Selected Items</strong><br/>
<ul id="orderList">
<li>No items selected</li>
</ul>
</div>
<div class="total">
<strong>Total:</strong> ₹<span id="orderTotal">0.00</span>
</div>
<button disabled="" id="confirmOrder">Confirm Order</button>
<button id="sendWhatsApp">Send via WhatsApp</button>
</div>
</section>
<!-- End Order Summary Section -->
<!-- Guest Information Section -->
<section aria-label="Guest Information" id="guestSection">
<h2 id="guestInfoTitle">Guest Information</h2>
<form id="guestInfo" novalidate="">
<label for="guestName" id="guestNameLabel">Guest Name <sup>*</sup></label>
<input aria-required="true" autocomplete="name" id="guestName" name="guestName" placeholder="Enter your name" required="" type="text"/>
<label for="roomNumber" id="roomNumberLabel">Room Number <sup>*</sup></label>
<input aria-required="true" autocomplete="off" id="roomNumber" name="roomNumber" pattern="^[0-9a-zA-Z\s-]+$" placeholder="Enter your room number" required="" type="text"/>
<label for="guestWhatsApp" id="guestWhatsAppLabel">WhatsApp Number <sup>*</sup></label>
<input aria-required="true" autocomplete="tel" id="guestWhatsApp" name="guestWhatsApp" pattern="^\+?[0-9]{7,15}$" placeholder="+1234567890" required="" type="tel"/>
</form>
</section>
<!-- Guest Information Section -->
</main>
<script>
         (() => {
                   
                
           const menuContainer = document.getElementById('menuContainer');
           const tabVegBtn = document.getElementById('tabVeg');
           const tabNonVegBtn = document.getElementById('tabNonVeg');
           const tabGeneralBtn = document.getElementById('tabGeneral');
         const orderList = document.getElementById('orderList');
         const orderTotalEl = document.getElementById('orderTotal');
         const confirmOrderBtn = document.getElementById('confirmOrder');
           const guestNameEl = document.getElementById('guestName');
         const roomNoEl = document.getElementById('roomNumber');
         const whatsappEl = document.getElementById('guestWhatsApp');
         
           let menuData = { veg:{}, nonveg:{}, general:{} };
           let currentTab = 'veg';
           let currentOrder = {};
         
         function parseCSV(text) {
         const lines = text.trim().split('\n');
         const headers = lines[0].split(',').map(h => h.trim());
         
         return lines.slice(1).map(line => {
         const values = [];
         let match;
         const regex = /("([^"]*)"|[^,]+)/g; // match quoted "..." or unquoted text
         
         while ((match = regex.exec(line)) !== null) {
         if (match[2] !== undefined) {
         values.push(match[2]); // inside quotes
         } else {
         values.push(match[1]);
         }
         }
         
         const obj = {};
         headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : "");
         return obj;
         });
         }
         
         
           function renderMenu() {
             const data = menuData[currentTab];
             if (!data || Object.keys(data).length === 0) { menuContainer.innerHTML = '<p>No items</p>'; return; }
             let tabsHtml = '<div class="category-tabs">';
             for (const category of Object.keys(data)) {
               tabsHtml += `<button data-category="${category}" onclick="showCategory('${category}')">${category}</button>`;
             }
             tabsHtml += '</div><div id="categoryContent"></div>';
             menuContainer.innerHTML = tabsHtml;
             const firstCategory = Object.keys(data)[0];
             if (firstCategory) showCategory(firstCategory);
           }
         
           window.showCategory = function(category) {
         const items = menuData[currentTab][category] || [];
         const container = document.getElementById('categoryContent');
         container.innerHTML = ''; // Clear the content first
         
         items.forEach(item => {
         const qty = currentOrder[item.Name]?.qty || 0;
         container.innerHTML += `
            <div class="menu-item">
                <div class="menu-item-details">
                    <div class="item-name">${item.Name}</div>
                    <div class="item-desc">${item.Description}</div>
                </div>
                <div class="menu-item-controls">
                    <div class="item-price" aria-label="Price">₹${parseFloat(item.Price).toFixed(2)}</div>
                    <div class="quantity-selector" id="qty-${item.Name.replace(/\s+/g, '_')}">
                        ${qty > 0 
                            ? `<button class="dec-btn" data-name="${item.Name}" data-price="${item.Price}">-</button>
                               <span class="qty-val">${qty}</span>
                               <button class="inc-btn" data-name="${item.Name}" data-price="${item.Price}">+</button>`
                            : `<button class="add-btn" data-name="${item.Name}" data-price="${item.Price}">Add</button>`
                        }
                    </div>
                </div>
            </div>
         `;
         
         	// Add button → starts qty = 1
         		container.querySelectorAll('.add-btn').forEach(btn => {
         		  btn.addEventListener('click', () => {
         			const name = btn.dataset.name;
         			const price = parseFloat(btn.dataset.price);
         			currentOrder[name] = { qty: 1, price };
         			updateOrderSummary();
         			showCategory(category); // re-render controls
         		  });
         		});
         
         
         
                 	// Increment button
         		container.querySelectorAll('.inc-btn').forEach(btn => {
         		  btn.addEventListener('click', () => {
         			const name = btn.dataset.name;
         			currentOrder[name].qty++;
         			updateOrderSummary();
         			showCategory(category);
         		  });
         		});
         
         	// Decrement button
         		container.querySelectorAll('.dec-btn').forEach(btn => {
         		  btn.addEventListener('click', () => {
         			const name = btn.dataset.name;
         			currentOrder[name].qty--;
         			if (currentOrder[name].qty <= 0) delete currentOrder[name];
         			updateOrderSummary();
         			showCategory(category);
         		  });
         		});
             });
             container.querySelectorAll('input[type="number"]').forEach(input => input.addEventListener('input', onQtyChange));
           };
         
         // This function handles quantity change inputs
         function onQtyChange(e) {
         const input = e.target;
         const name = input.dataset.name;
         const price = parseFloat(input.dataset.price);
         const qty = parseInt(input.value) || 0;
         if (qty > 0) currentOrder[name] = { qty, price };
         else delete currentOrder[name];
         updateOrderSummary();
         }
         
         
         
         
         
         
         window.showCategory = function(category) {
         const items = menuData[currentTab][category] || [];
         const container = document.getElementById('categoryContent');
         container.innerHTML = ''; // Clear the content first
         
         items.forEach(item => {
         const qty = currentOrder[item.Name]?.qty || 0;
         container.innerHTML += `
            <div class="menu-item">
                <div class="menu-item-details">
                    <div class="item-name">${item.Name}</div>
                    <div class="item-desc">${item.Description}</div>
                </div>
                <div class="menu-item-controls">
                    <div class="item-price" aria-label="Price">₹${parseFloat(item.Price).toFixed(2)}</div>
                    <div class="quantity-selector" id="qty-${item.Name.replace(/\s+/g, '_')}">
                        ${qty > 0 
                            ? `<button class="dec-btn" data-name="${item.Name}" data-price="${item.Price}">-</button>
                               <span class="qty-val">${qty}</span>
                               <button class="inc-btn" data-name="${item.Name}" data-price="${item.Price}">+</button>`
                            : `<button class="add-btn" data-name="${item.Name}" data-price="${item.Price}">Add</button>`
                        }
                    </div>
                </div>
            </div>
         `;
         
         // Add button event listener
         container.querySelectorAll('.add-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const name = e.target.dataset.name;
                const price = parseFloat(e.target.dataset.price);
                currentOrder[name] = { qty: 1, price };
                updateOrderSummary();
                showCategory(category); // re-render controls after adding
            });
         });
         
         // Increment button event listener
         container.querySelectorAll('.inc-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const name = e.target.dataset.name;
                currentOrder[name].qty++;
                updateOrderSummary();
                showCategory(category); // re-render controls
            });
         });
         
         // Decrement button event listener
         container.querySelectorAll('.dec-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const name = e.target.dataset.name;
                currentOrder[name].qty--;
                if (currentOrder[name].qty <= 0) {
                    delete currentOrder[name];
                    showCategory(category); // revert to "Add" button
                } else {
                    updateOrderSummary();
                    showCategory(category); // re-render controls
                }
            });
         });
         });
         };
         
         // This function handles quantity change inputs
         function onQtyChange(e) {
         const input = e.target;
         const name = input.dataset.name;
         const price = parseFloat(input.dataset.price);
         const qty = parseInt(input.value) || 0;
         if (qty > 0) currentOrder[name] = { qty, price };
         else delete currentOrder[name];
         updateOrderSummary();
         }
         
         function updateOrderSummary() {
         orderList.innerHTML = '';
         let total = 0;
         for (const [name, item] of Object.entries(currentOrder)) {
         const lineTotal = item.qty * item.price;
         total += lineTotal;
         orderList.innerHTML += `<li>${name} x ${item.qty} = ₹${lineTotal}</li>`;
         }
         orderTotalEl.textContent = total.toFixed(2);
         }
         
         
         
         
           // Tab switching
         
         
           function switchActive(activeBtn) {
             [tabVegBtn, tabNonVegBtn, tabGeneralBtn].forEach(btn => btn.classList.remove('active'));
             activeBtn.classList.add('active');
           }
           tabVegBtn.addEventListener('click', () => { currentTab = 'veg'; switchActive(tabVegBtn); renderMenu(); });
           tabNonVegBtn.addEventListener('click', () => { currentTab = 'nonveg'; switchActive(tabNonVegBtn); renderMenu(); });
           tabGeneralBtn.addEventListener('click', () => { currentTab = 'general'; switchActive(tabGeneralBtn); renderMenu(); });
         
           // Load menu.csv
           fetch('menu.csv')
             .then(r => r.text())
             .then(text => {
               const rows = parseCSV(text);
               rows.forEach(row => {
                 const type = row.Type.toLowerCase();
                 const category = row.Category || "Misc";
                 if (!menuData[type][category]) menuData[type][category] = [];
                 menuData[type][category].push(row);
               });
               renderMenu();
             });
         
           confirmOrderBtn.addEventListener('click', () => {
             let orderDetails = Object.entries(currentOrder).map(([name, item]) => `${name} x ${item.qty}`).join(', ');
             let total = orderTotalEl.textContent;
             let msg = `Guest: ${guestNameEl.value}, Room: ${roomNoEl.value}, WhatsApp: ${whatsappEl.value}. Order: ${orderDetails}. Total: ₹${total}`;
             window.open(`https://wa.me/919985908131?text=${encodeURIComponent(msg)}`);
           });
         
           document.getElementById('faqBtn').onclick = () => { document.getElementById('faqModal').style.display = 'flex'; };
           document.getElementById('closeFaq').onclick = () => { document.getElementById('faqModal').style.display = 'none'; };
         })();
      </script>
</body>
