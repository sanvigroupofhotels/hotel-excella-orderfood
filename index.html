<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Hotel Excella - Food Ordering</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 <header class="app-header">
  <div class="header-content">
    <img src="images/hotelexcellalogo.png" alt="Hotel Excella Logo" class="logo">
   <!-- <h1 class="hotel-name">HOTEL EXCELLA</h1> -->
    <p class="tagline">IN-HOUSE ROOM SERVICE MENU</p>
  </div>
</header>

  <main>
    <section id="guestInfo" class="card">
      <h2>Guest Information</h2>
      <label for="guestName">Guest Name: *</label>
      <input type="text" id="guestName" placeholder="Enter your name" required>

      <label for="roomNo">Room Number: *</label>
      <input type="text" id="roomNo" placeholder="Enter your room number" required>

      <label for="Whatsappnum">WhatsApp Number: *</label>
      <input type="tel" id="Whatsappnum" placeholder="+1234567890" required>
    </section>

    <section id="menuSection" class="card">
      <h2>Menu</h2>
      <nav id="menuTabs">
        <button id="tabVeg" class="tab-btn active">Veg</button>
        <button id="tabNonVeg" class="tab-btn">Non Veg</button>
        <button id="tabGeneral" class="tab-btn">General</button>
      </nav>
      <div id="menuContainer">Loading menu…</div>
    </section>

    <section id="orderSummary" class="card">
      <h3>Order Summary</h3>
      <ul id="orderList"></ul>
      <p><strong>Total:</strong> ₹<span id="orderTotal">0.00</span></p>
      <button id="confirmOrder">Confirm Order</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
