<section id="orderSummarySection">
  <h2 style="color: var(--dark-green);">Order Summary</h2>
  <hr style="border: 1px solid var(--orange); margin: 0.5rem 0;">

  <div id="orderBox">
    <h3 style="color: var(--orange);">Selected Items</h3>
    <ul id="orderList" style="margin: 0.5rem 0; padding-left: 1rem; list-style-type: disc;">
      <li>No items selected</li>
    </ul>
    <hr style="border: 1px solid yellow; margin: 0.5rem 0;">
    <div style="font-weight: 700; color: #fff; margin: 0.5rem 0;">
      Total: ₹<span id="orderTotal">0.00</span>
    </div>
    <button id="confirmOrder" disabled>Confirm Order</button>
  </div>
</section>
