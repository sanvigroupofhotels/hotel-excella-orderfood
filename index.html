<!DOCTYPE html>
<html lang="en">
   <head>
     <meta charset="utf-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1"/>
      <title>Hotel Excella - Food Ordering</title>
      <style>
         :root {
	 --primary: #2e7d32; /* or your theme color */
  	 --accent: #f9a825;
         --orange: #f9a825;
         --dark-green: #2e7d32;
         --yellow: #fff176;
         --bg-black: #000000;
         --white: #ffffff;
         --light-gray: #f5f5f5;
         --dark-gray: #333333;
         --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         --font-main-size: 1rem;
         }
         body {
         margin: 0;
         font-family: var(--font-family);
         background-color: var(--bg-black);
         color: var(--white);
         line-height: 1.6;
         font-size: var(--font-main-size);
         }

         header {
         text-align: center;
         padding: 1rem 0;
         background: var(--dark-green);
         }
         header img {
         width: 80px;
         height: auto;
         margin-bottom: 0.5rem;
         }
         header h1 {
         margin: 0;
         font-size: 2rem;
         font-weight: 700;
         color: var(--orange);
         text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
         }
         header p {
         margin: 0;
         font-size: 1.1rem;
         font-weight: 600;
         color: var(--yellow);
         }
               main {
         max-width: 900px;
         margin: 1rem auto 4rem auto;
         background: var(--light-gray);
         border-radius: 12px;
         padding: 1rem 1.5rem;
         color: var(--dark-gray);
         position: relative;
         }

         section {
         margin-bottom: 2rem;
         }
         h2 {
         border-bottom: 0px solid var(--orange);
         padding-bottom: 0 rem;
         color: var(--dark-green);
         }
         


		#guestInfo label {
		  display: block;
		  font-weight: 750;
		  margin-bottom: 4px;
		  color: var(--primary);
		}
		#guestInfo input {
		  width: 90%;
		  padding: 10px;
		  border: 2px solid var(--primary);
		  border-radius: 6px;
		  margin-bottom: 15px;
		  font-size: 1rem;
		}
         #menuTabs { display: flex; margin-bottom: 0.5rem; border-radius: 8px; overflow: hidden; flex-wrap: wrap; }
         .tab-btn { flex: 1; min-width: 100px; padding: 0.6rem 0; font-weight: 600; text-align: center; cursor: pointer; background: #eee; border: none; }
         .tab-btn.active { background: var(--accent); color: var(--light); }
         .category-tabs { display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; padding: 8px 0; margin-bottom: 0.5rem; }
         .category-tabs button { flex: 0 0 auto; border: 1px solid #aaa; background: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
		 
.category-tabs button.active {
  border-color: green;
  background: green;
  color: #fff;
}

		 .menu-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px dotted var(--dark-green);
      }
      .menu-item:last-child {
      border-bottom: none;
      }

         .item-info {
         flex-grow: 1; /* Allow the item name and description to take up available space */
         margin-right: 10px;
         }

		.item-name {
		  font-weight: 700;
		  font-size: 1.15rem;
		  color: var(--primary);
		  margin-bottom: 4px;
		}
         .item-desc {
         font-style: italic;
         font-size: 0.9rem;
         color: #555;
         margin-top: 0.2rem;
         }
      .item-price {
      font-weight: 700;
      font-size: 1.1rem;
      margin-right: 1rem;
      color: var(--accent);
      min-width: 75px;
      text-align: right;
      }


#orderBox {
  background: var(--primary);
  color: #fff;
  border-radius: 8px;
  padding: 1rem;
}

#orderList {
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 1rem;
}

#totalBox {
  font-size: 1.2rem;
  font-weight: 700;
  border-top: 2px solid var(--accent);
  padding-top: 0.5rem;
  margin-bottom: 1rem;
}

#confirmOrder {
  width: 100%;
  padding: 0.8rem;
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.3s ease;
}

#confirmOrder:disabled {
  background: #bbb;
  cursor: not-allowed;
}




		@media (max-width: 600px) {




		  .quantity-selector {
			grid-column: 2;
			grid-row: 2;
		  }
		}
.quantity-selector {
         display: inline-flex;
         align-items: center;
         gap: 0.3rem;
         }

         .quantity-selector button {
         padding: 4px 8px;
         border: none;
         border-radius: 6px;
         background: #28a745; /* Green color */
         color: #fff;
         cursor: pointer;
         font-size: 0.9rem;
         }


         .quantity-selector button:hover {
         background: var(--accent);
         }
         .quantity-selector .qty-val {
         min-width: 20px;
         text-align: center;
         font-weight: 600;
         }
      </style>

<!-- ---------- Mobile Responsive ---------- -->


<style id="mobile-responsive-overrides">
@media (max-width: 768px) {
  main {
    padding: 0.5rem;
  }

  .menu-item {
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    padding: 10px;
  }

  .item-price {
    grid-column: 2;
    grid-row: 1;
    font-size: 1rem;
  }

  .quantity-selector {
    grid-column: 2;
    grid-row: 2;
    margin-top: 6px;
  }

  .item-info {
    grid-column: 1 / span 2;
    grid-row: 1;
  }

  #orderBox {
    padding: 0.8rem;
  }

  #confirmOrder {
    font-size: 1rem;
    padding: 0.7rem;
  }

  #helpBtn {
    font-size: 1rem;
    padding: 0.5rem 0.8rem;
  }
}

@media (max-width: 480px) {
  .item-name {
    font-size: 1rem;
  }

  .item-desc {
    font-size: 0.8rem;
  }

  .item-price {
    font-size: 0.95rem;
  }

  .quantity-selector button {
    font-size: 0.75rem;
    padding: 3px 6px;
  }

  .quantity-selector .qty-val {
    font-size: 0.85rem;
  }
}
    </style>

<!--  ---------- Mobile Responsive ---------- -->

   </head>
   <body>
      <header>
<div style="display: flex; align-items: center; justify-content: space-between;">
<div style="flex: 1; text-align: centre;">
<img alt="Hotel Logo" src="images/hotelexcellalogo.png" style="width: 125px; height: auto;"/>
<h1 style="margin: 0;">HOTEL EXCELLA</h1>
         <p style="margin: 0; color: black; font-weight: 900;">IN-HOUSE ROOM SERVICE MENU</p>
      </header>
      
      <main>
		<section id="guestInfo" class="card">
		  <h2>Guest Information</h2>
		  
		  <label for="guestName">Guest Name: *</label>
		  <input type="text" id="guestName" placeholder="Enter your name" required>
		  
		  <label for="roomNo">Room Number: *</label>
		  <input type="text" id="roomNo" placeholder="Enter your room number" required>
		  
		  <label for="Whatsappnum">WhatsApp Number: *</label>
		  <input type="tel" id="Whatsappnum" placeholder="+1234567890" required>
		</section>



<!-- Menu Section -->
<section aria-label="Menu Section" id="menuSection">
<h2 id="menuTitle">Menu</h2>
<nav aria-label="Food category tabs" id="menuTabs" role="tablist" tabindex="0">
<button aria-controls="panelVeg" aria-selected="true" class="tab-btn active" id="tabVeg" role="tab" tabindex="0">Veg</button>
<button aria-controls="panelNonVeg" aria-selected="false" class="tab-btn" id="tabNonVeg" role="tab" tabindex="-1">Non Veg</button>
<button aria-controls="panelGeneral" aria-selected="true" class="tab-btn" id="tabGeneral" role="tab" tabindex="2">General</button>
</nav>
            </nav>
            <div id="menuContainer">Loading menu…</div>



<!-- Order Summary Section -->
<section id="orderSummarySection">
  <h2 style="color: var(--primary);">Order Summary</h2>

  <div id="orderBox" style="background: var(--primary); color: #fff; border-radius: 8px; padding: 1rem;">
    <h3 style="color: var(--accent); margin: 0; border-bottom: none;">Selected Items</h3>

    <ul id="orderList" style="margin: 0.5rem 0; padding-left: 1rem; list-style-type: disc; max-height: 200px; overflow-y: auto;">
      <li>No items selected</li>
    </ul>

<div id="totalBox" 
     style="font-weight: 700; font-size: 1.2rem; margin: 0.5rem 0; border-top: 2px solid var(--accent); padding-top: 0.5rem; text-align: right;">
  Total: ₹<span id="orderTotal">0.00</span>
</div>

    <div style="text-align: right;">
      <button id="confirmOrder" disabled 
        style="width: 40%; padding: 0.8rem; background: var(--accent); color: #fff; font-weight: 700; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer;">
        Confirm Order
      </button>
    </div>
  </div>
</section>
<!-- End Order Summary Section -->





      </main>
     
      <script>
         (() => {
                  
           const menuContainer = document.getElementById('menuContainer');
           const tabVegBtn = document.getElementById('tabVeg');
           const tabNonVegBtn = document.getElementById('tabNonVeg');
           const tabGeneralBtn = document.getElementById('tabGeneral');
           const orderList = document.getElementById('orderList');
           const orderTotalEl = document.getElementById('orderTotal');
           const confirmOrderBtn = document.getElementById('confirmOrder');
           const guestNameEl = document.getElementById('guestName');
           const roomNoEl = document.getElementById('roomNo');
           const whatsappEl = document.getElementById('Whatsappnum');
         
           let menuData = { veg:{}, nonveg:{}, general:{} };
           let currentTab = 'veg';
           let currentOrder = {};
         
		function parseCSV(text) {
		  const lines = text.trim().split('\n');
		  const headers = lines[0].split(',').map(h => h.trim());

		  return lines.slice(1).map(line => {
			const values = [];
			let match;
			const regex = /("([^"]*)"|[^,]+)/g; // match quoted "..." or unquoted text

			while ((match = regex.exec(line)) !== null) {
			  if (match[2] !== undefined) {
				values.push(match[2]); // inside quotes
			  } else {
				values.push(match[1]);
			  }
			}

			const obj = {};
			headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : "");
			return obj;
		  });
		}

         
           function renderMenu() {
             const data = menuData[currentTab];
             if (!data || Object.keys(data).length === 0) { menuContainer.innerHTML = '<p>No items</p>'; return; }
             let tabsHtml = '<div class="category-tabs">';
             for (const category of Object.keys(data)) {
               tabsHtml += `<button data-category="${category}" onclick="showCategory('${category}')">${category}</button>`;
             }
             tabsHtml += '</div><div id="categoryContent"></div>';
             menuContainer.innerHTML = tabsHtml;
             const firstCategory = Object.keys(data)[0];
             if (firstCategory) showCategory(firstCategory);
           }
         
           window.showCategory = function(category) {
             const items = menuData[currentTab][category] || [];
             const container = document.getElementById('categoryContent');
             container.innerHTML = '';





             items.forEach(item => {
               const qty = currentOrder[item.Name]?.qty || 0;
               container.innerHTML += `
                 <div class="menu-item">
                   <div class="item-info">
			<div class="item-name">${item.Name}</div>
			<div class="item-desc">${item.Description}</div>
		   </div>
                   <div class="item-price">₹${item.Price}</div>
                   <div class="quantity-selector" id="qty-${item.Name.replace(/\s+/g,'_')}">
         			  ${qty > 0 
         				? `<button class="dec-btn" data-name="${item.Name}" data-price="${item.Price}">-</button>
         				   <span class="qty-val">${qty}</span>
         				   <button class="inc-btn" data-name="${item.Name}" data-price="${item.Price}">+</button>`
         				: `<button class="add-btn" data-name="${item.Name}" data-price="${item.Price}">Add</button>`}
         			</div>
                 </div>`;
			// Highlight active sub tab
				document.querySelectorAll('.category-tabs button').forEach(btn => {
				  if (btn.getAttribute('data-category') === category) {
					btn.classList.add('active');
				  } else {
					btn.classList.remove('active');
				  }
				});
         	// Add button → starts qty = 1
         		container.querySelectorAll('.add-btn').forEach(btn => {
         		  btn.addEventListener('click', () => {
         			const name = btn.dataset.name;
         			const price = parseFloat(btn.dataset.price);
         			currentOrder[name] = { qty: 1, price };
         			updateOrderSummary();
         			showCategory(category); // re-render controls
         		  });
         		});
         
         	// Increment button
         		container.querySelectorAll('.inc-btn').forEach(btn => {
         		  btn.addEventListener('click', () => {
         			const name = btn.dataset.name;
         			currentOrder[name].qty++;
         			updateOrderSummary();
         			showCategory(category);
         		  });
         		});
         
         	// Decrement button
         		container.querySelectorAll('.dec-btn').forEach(btn => {
         		  btn.addEventListener('click', () => {
         			const name = btn.dataset.name;
         			currentOrder[name].qty--;
         			if (currentOrder[name].qty <= 0) delete currentOrder[name];
         			updateOrderSummary();
         			showCategory(category);
         		  });
         		});
             });
             container.querySelectorAll('input[type="number"]').forEach(input => input.addEventListener('input', onQtyChange));
           };
         
           function onQtyChange(e) {
             const input = e.target;
             const name = input.dataset.name;
             const price = parseFloat(input.dataset.price);
             const qty = parseInt(input.value) || 0;
             if (qty > 0) currentOrder[name] = { qty, price };
             else delete currentOrder[name];
             updateOrderSummary();
           }
         
           function updateOrderSummary() {
             orderList.innerHTML = '';
             let total = 0;
             for (const [name, item] of Object.entries(currentOrder)) {
               const lineTotal = item.qty * item.price;
               total += lineTotal;
               orderList.innerHTML += `<li>${name} x ${item.qty} = ₹${lineTotal}</li>`;
             }
             orderTotalEl.textContent = total.toFixed(2);
           }
         
           // Tab switching
           function switchActive(activeBtn) {
             [tabVegBtn, tabNonVegBtn, tabGeneralBtn].forEach(btn => btn.classList.remove('active'));
             activeBtn.classList.add('active');
           }
           tabVegBtn.addEventListener('click', () => { currentTab = 'veg'; switchActive(tabVegBtn); renderMenu(); });
           tabNonVegBtn.addEventListener('click', () => { currentTab = 'nonveg'; switchActive(tabNonVegBtn); renderMenu(); });
           tabGeneralBtn.addEventListener('click', () => { currentTab = 'general'; switchActive(tabGeneralBtn); renderMenu(); });
         
           // Load menu.csv
           fetch('menu.csv')
             .then(r => r.text())
             .then(text => {
               const rows = parseCSV(text);
               rows.forEach(row => {
                 const type = row.Type.toLowerCase();
                 const category = row.Category || "Misc";
                 if (!menuData[type][category]) menuData[type][category] = [];
                 menuData[type][category].push(row);
               });
               renderMenu();
             });
         
           confirmOrderBtn.addEventListener('click', () => {
             let orderDetails = Object.entries(currentOrder).map(([name, item]) => `${name} x ${item.qty}`).join(', ');
             let total = orderTotalEl.textContent;
             let msg = `Guest: ${guestNameEl.value}, Room: ${roomNoEl.value}, WhatsApp: ${whatsappEl.value}. Order: ${orderDetails}. Total: ₹${total}`;
             window.open(`https://wa.me/919985908131?text=${encodeURIComponent(msg)}`);
           });
         
           document.getElementById('faqBtn').onclick = () => { document.getElementById('faqModal').style.display = 'flex'; };
           document.getElementById('closeFaq').onclick = () => { document.getElementById('faqModal').style.display = 'none'; };
         })();
      </script>
   </body>
</html>
